name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: '${{ secrets.REGISTRY_LOGIN_SERVER }}'
          username: '${{ secrets.REGISTRY_USERNAME }}'
          password: '${{ secrets.REGISTRY_PASSWORD }}'

      - name: Build and Push Backend Image
        run: |
          docker build -t "${{ secrets.REGISTRY_LOGIN_SERVER }}/testpilot-backend:latest" ./backend
          docker push "${{ secrets.REGISTRY_LOGIN_SERVER }}/testpilot-backend:latest"

      - name: Build and Push Frontend Image
        run: |
          docker build -t "${{ secrets.REGISTRY_LOGIN_SERVER }}/testpilot-frontend:latest" ./frontend
          docker push "${{ secrets.REGISTRY_LOGIN_SERVER }}/testpilot-frontend:latest"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Azure App Service Update
        run: |
          echo "Docker images successfully built and pushed to the registry."